<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lily App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;
  --surface:#111;
  --surface2:#1a1a1a;
  --surface3:#222;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#f5f5f5;
  --muted:#555;
  --muted2:#888;
  --r:16px;
  --hud-h:60px;
  /* Accent palette */
  --red:#ff1a1a;
  --orange:#ff6a00;
  --yellow:#ffe600;
  --lime:#7fff00;
  --blue:#0077ff;
  --violet:#8000ff;
  --grad:linear-gradient(135deg,#ff1a1a,#ff6a00,#ffe600,#7fff00,#0077ff,#8000ff);
  --grad2:linear-gradient(135deg,#7fff00,#0077ff);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  overflow-x:hidden;overscroll-behavior:none}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:0}

/* ── Splash / Logo ── */
.splash{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s ease;
}
.splash.hide{opacity:0;pointer-events:none}
.splash-logo{
  width:80px;height:80px;border-radius:22px;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  box-shadow:0 0 40px rgba(255,26,26,0.5);
  animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(255,26,26,0.3)}50%{box-shadow:0 0 60px rgba(128,0,255,0.6)}}
.splash-name{font-size:28px;font-weight:700;letter-spacing:-1px}
.splash-name span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.splash-sub{font-size:13px;color:var(--muted2)}

/* ── HUD ── */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--hud-h);
  padding-top:env(safe-area-inset-top);
  background:rgba(8,8,8,0.82);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;padding-left:20px;padding-right:12px;gap:10px;
}
.hud-brand{
  display:flex;align-items:center;gap:10px;flex:1;
}
.hud-icon{
  width:32px;height:32px;border-radius:9px;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  flex-shrink:0;
}
.hud-title{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.hud-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud-count{
  font-size:11px;font-weight:600;letter-spacing:0.5px;
  background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hud-actions{display:flex;gap:2px}
.hud-btn{
  background:none;border:none;color:var(--muted2);
  padding:8px;cursor:pointer;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.hud-btn:active{background:var(--surface2);color:var(--text)}
.hud-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── Hero banner ── */
.hero{
  margin-top:var(--hud-h);
  padding:20px 16px 0;
  transition:padding-top .25s;
}
.hero-inner{
  border-radius:20px;
  background:linear-gradient(135deg,#0f0a00,#001020,#001a08);
  border:0.5px solid var(--border2);
  padding:24px 20px;
  position:relative;overflow:hidden;
}
.hero-inner::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,26,26,0.18),transparent 70%);
  pointer-events:none;
}
.hero-inner::after{
  content:'';position:absolute;bottom:-40px;left:-20px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(128,0,255,0.15),transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:6px}
.hero-h{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:8px}
.hero-h em{
  font-style:normal;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:13px;color:var(--muted2);line-height:1.5}
.hero-chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.chip{
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;
  border:0.5px solid;cursor:pointer;transition:all .15s;letter-spacing:0.3px;
}
.chip-pink{color:#ff6a00;border-color:rgba(255,106,0,0.35);background:rgba(255,106,0,0.08)}
.chip-cyan{color:#0077ff;border-color:rgba(0,119,255,0.35);background:rgba(0,119,255,0.08)}
.chip-lime{color:#7fff00;border-color:rgba(127,255,0,0.35);background:rgba(127,255,0,0.08)}
.chip:active{transform:scale(0.95)}

/* ── Section header ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 16px 10px;
}
.section-label{font-size:13px;font-weight:600;color:var(--muted2);letter-spacing:0.5px;text-transform:uppercase}
.section-badge{
  font-size:11px;font-weight:700;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── Grid ── */
.gallery{
  padding:0 16px calc(32px + env(safe-area-inset-bottom));
  display:grid;grid-template-columns:repeat(3,1fr);gap:3px;
}
.gallery.two{grid-template-columns:repeat(2,1fr);gap:6px}

.card{
  aspect-ratio:1;overflow:hidden;cursor:pointer;
  background:var(--surface2);position:relative;border-radius:0;
  transition:transform .1s;
}
.gallery.two .card{border-radius:14px}
.card img{width:100%;height:100%;object-fit:cover;display:block}
.card:active{transform:scale(0.97)}

/* Gradient overlay on card */
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
}
.card:active .card-overlay{opacity:1}

/* Desc dot */
.card-dot{
  position:absolute;bottom:7px;right:7px;
  width:8px;height:8px;border-radius:50%;
  background:var(--grad);
  display:none;
  box-shadow:0 0 6px rgba(255,26,26,0.7);
}
.card-dot.show{display:block}

/* Featured first card */
.card.featured{
  grid-column:span 2;grid-row:span 2;
  border-radius:0;
}
.gallery.two .card.featured{border-radius:18px}

/* ── Lightbox ── */
.lb{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);flex-direction:column;
}
.lb.open{display:flex}

.lb-topbar{
  height:var(--hud-h);
  padding:0 8px 0 4px;
  padding-top:env(safe-area-inset-top);
  flex-shrink:0;
  display:flex;align-items:center;gap:4px;
  background:rgba(8,8,8,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:0.5px solid var(--border);
}
.lb-back{
  background:none;border:none;color:var(--text);
  padding:8px 12px;cursor:pointer;
  display:flex;align-items:center;gap:2px;
  font-size:15px;font-weight:500;
}
.lb-back svg{width:22px;height:22px;stroke:var(--pink);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.lb-topbar-info{flex:1;min-width:0}
.lb-topbar-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.lb-topbar-count{font-size:11px;color:var(--muted2)}
.lb-share-btn{
  background:none;border:none;color:var(--muted2);padding:8px 12px;cursor:pointer;
}
.lb-share-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block}

/* Image area */
.lb-img-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;touch-action:pan-y;
  background:#000;
}
.lb-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none}

/* Swipe hint arrows */
.lb-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
  transition:opacity .2s;
}
.lb-arrow.l{left:10px}
.lb-arrow.r{right:10px}

/* Bottom sheet */
.lb-sheet{
  background:var(--surface);
  border-top:0.5px solid var(--border2);
  border-radius:24px 24px 0 0;
  padding:0 16px calc(20px + env(safe-area-inset-bottom));
  flex-shrink:0;
}
.lb-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--border2);margin:12px auto 16px;
}

.lb-desc-wrap{position:relative}
.lb-desc-label{
  font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
  color:var(--muted2);margin-bottom:8px;
}
textarea.lb-desc{
  width:100%;background:var(--surface2);
  border:0.5px solid var(--border2);border-radius:12px;
  color:var(--text);font-size:14px;line-height:1.55;
  padding:12px 14px;resize:none;outline:none;
  font-family:inherit;min-height:72px;max-height:120px;
  transition:border-color .2s;
}
textarea.lb-desc:focus{border-color:#0077ff}

.lb-actions{display:flex;gap:8px;margin-top:10px;align-items:center}


.lb-saved{
  font-size:12px;font-weight:600;
  background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-top:8px;height:16px;opacity:0;transition:opacity .25s;
}
.lb-saved.show{opacity:1}

/* ── Empty ── */
.empty{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--muted);font-size:14px}

/* Editable title */
.lb-topbar-name{
  cursor:pointer;
  border-bottom:1px dashed transparent;
  transition:border-color .2s;
  min-width:40px;display:inline-block;
}
.lb-topbar-name:hover,.lb-topbar-name:active{border-color:rgba(255,255,255,0.3)}
.lb-topbar-name.empty-title{color:var(--muted2);font-style:italic}
#lb-title-input{
  background:none;border:none;border-bottom:1px solid var(--muted2);
  color:var(--text);font-size:14px;font-weight:600;
  font-family:inherit;outline:none;width:160px;max-width:100%;
  padding:0 0 2px;
}

/* SVG gradient defs (hidden) */
.svg-defs{position:absolute;width:0;height:0;overflow:hidden}
</style>
</head>

<!-- HUD -->
<div class="hud">

<div class="hero" id="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">Collezione</div>

</div>

<!-- Section header -->
<div class="section-head">
  <span class="section-label">Galleria</span>
  <span class="section-badge" id="section-badge">20 foto</span>
</div>

<!-- Gallery -->
<div class="gallery" id="gallery"></div>

<!-- Lightbox -->
<div class="lb" id="lb">
  <div class="lb-topbar">
    <button class="lb-back" onclick="closeLb()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>

    <div class="lb-saved" id="lb-saved">✦ Salvata</div>
  </div>

<script>
// ── IndexedDB ──
const DB = 'lily-app-db', ST = 'descriptions', ST2 = 'titles';
let db, descriptions = {}, titles = {}, layoutMode = 'three';

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB, 2);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains(ST)) d.createObjectStore(ST, {keyPath:'name'});
      if(!d.objectStoreNames.contains(ST2)) d.createObjectStore(ST2, {keyPath:'name'});
    };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror = () => rej(r.error);
  });
}
function dbGet(name) {
  return new Promise((res) => {
    const r = db.transaction(ST,'readonly').objectStore(ST).get(name);
    r.onsuccess = () => res(r.result ? r.result.value : '');
    r.onerror = () => res('');
  });
}
function dbPut(name, value) {
  return new Promise((res) => {
    const r = db.transaction(ST,'readwrite').objectStore(ST).put({name,value});
    r.onsuccess = () => res();
    r.onerror = () => res();
  });
}
function dbGetAll() {
  return new Promise((res) => {
    const r = db.transaction(ST,'readonly').objectStore(ST).getAll();
    r.onsuccess = () => {
      const m = {};
      r.result.forEach(x => m[x.name] = x.value);
      res(m);
    };
    r.onerror = () => res({});
  });
}
function dbGetAllTitles() {
  return new Promise((res) => {
    const r = db.transaction(ST2,'readonly').objectStore(ST2).getAll();
    r.onsuccess = () => {
      const m = {};
      r.result.forEach(x => m[x.name] = x.value);
      res(m);
    };
    r.onerror = () => res({});
  });
}
function dbPutTitle(name, value) {
  return new Promise((res) => {
    const r = db.transaction(ST2,'readwrite').objectStore(ST2).put({name,value});
    r.onsuccess = () => res();
    r.onerror = () => res();
  });

const TOTAL = 12;
const images = [img1,img2,img3,img4,img5,img6,img7,img8,img9,img10,img11,img12].map((src,i)=>({
  id:i+1, name:`Lily${i+1}`, src:src
}));
let filtered = [...images];
let currentIdx = 0;

// ── Layout ──
function toggleLayout() {
  const g = document.getElementById('gallery');
  const ico = document.getElementById('icon-layout');
  if(layoutMode === 'three') {
    layoutMode = 'two';
    g.classList.add('two');
    ico.innerHTML = '<rect x="3" y="3" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="5" rx="1"/><rect x="3" y="17" width="18" height="5" rx="1"/>';
  } else {
    layoutMode = 'three';
    g.classList.remove('two');
    ico.innerHTML = '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>';
  }
  render();
}

// ── Render ──

function render() {
  filtered = [...images];
  const n = filtered.length;
  document.getElementById('hud-count').textContent = n + ' foto';
  document.getElementById('section-badge').textContent = n + ' foto';
  const g = document.getElementById('gallery');
  if(!n) { g.innerHTML='<div class="empty">Nessuna immagine trovata</div>'; return; }
  g.innerHTML = filtered.map((im,i) => {
    const hasDot = !!(descriptions[im.name] && descriptions[im.name].trim());
    const feat = i === 0 && layoutMode === 'three' ? 'featured' : '';
    return `<div class="card ${feat}" onclick="openLb(${i})">
      <img src="${im.src}" alt="${im.name}" loading="lazy" onerror="this.style.background='#1a1a1a'">
      <div class="card-overlay"></div>
      <div class="card-dot ${hasDot?'show':''}"></div>
    </div>`;
  }).join('');
}

// ── Lightbox ──
async function openLb(i) {
  currentIdx = i;
  const im = filtered[i];
  document.getElementById('lb-img').src = im.src;
  document.getElementById('lb-img').alt = im.name;
  document.getElementById('lb-count').textContent = (i+1) + ' di ' + filtered.length;
  document.getElementById('lb-saved').classList.remove('show');
  document.getElementById('lb-desc').value = await dbGet(im.name);
  // load title
  const t = titles[im.name] || '';
  const nameEl = document.getElementById('lb-name');
  if(t) { nameEl.textContent = t; nameEl.classList.remove('empty-title'); }
  else { nameEl.textContent = 'Aggiungi titolo'; nameEl.classList.add('empty-title'); }
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function startEditTitle() {
  const im = filtered[currentIdx];
  const nameEl = document.getElementById('lb-name');
  const current = titles[im.name] || '';
  const input = document.createElement('input');
  input.id = 'lb-title-input';
  input.type = 'text';
  input.value = current;
  input.placeholder = 'Titolo…';
  nameEl.replaceWith(input);
  input.focus();
  input.select();
  async function commitTitle() {
    const val = input.value.trim();
    await dbPutTitle(im.name, val);
    titles[im.name] = val;
    const span = document.createElement('span');
    span.className = 'lb-topbar-name' + (val ? '' : ' empty-title');
    span.id = 'lb-name';
    span.textContent = val || 'Aggiungi titolo';
    span.onclick = startEditTitle;
    span.title = 'Tocca per modificare il titolo';
    input.replaceWith(span);
  }
  input.addEventListener('blur', commitTitle);
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); if(e.key==='Escape') input.blur(); });
}

function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}

async function navigate(dir) {
  currentIdx = (currentIdx + dir + filtered.length) % filtered.length;
  await openLb(currentIdx);
}

// ── Autosave ──
let autosaveTimer = null;
document.getElementById('lb-desc').addEventListener('input', () => {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(saveDesc, 800);
});

async function saveDesc() {
  const im = filtered[currentIdx];
  const val = document.getElementById('lb-desc').value;
  await dbPut(im.name, val);
  descriptions[im.name] = val;
  const el = document.getElementById('lb-saved');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
  render();
}

// ── Swipe ──
let tx = 0, ty = 0;
document.getElementById('lb-img-wrap').addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, {passive:true});
document.getElementById('lb-img-wrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 44) navigate(dx < 0 ? 1 : -1);
}, {passive:true});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if(!document.getElementById('lb').classList.contains('open')) return;
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
  if(e.key==='Escape') closeLb();
});

// ── Init ──
openDB().then(async () => {
  descriptions = await dbGetAll();
  titles = await dbGetAllTitles();
  render();
  setTimeout(() => {
    const s = document.getElementById('splash');
    s.classList.add('hide');
    setTimeout(() => s.remove(), 600);
  }, 1200);
});
</script>
</body>
